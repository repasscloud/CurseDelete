name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    if: github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v')

    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: cursedelete.exe
          - os: ubuntu-latest
            rid: linux-x64
            artifact: cursedelete

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: >
          dotnet publish
          -r ${{ matrix.rid }}
          -c Release
          --output ./publish/${{ matrix.rid }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rid }}
          path: ./publish/${{ matrix.rid }}/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Rename artifacts for release
        run: |
          mv ./artifacts/win-x64/cursedelete.exe  ./artifacts/cursedelete-win-x64.exe
          mv ./artifacts/linux-x64/cursedelete     ./artifacts/cursedelete-linux-x64
          chmod +x ./artifacts/cursedelete-linux-x64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ./artifacts/cursedelete-win-x64.exe
            ./artifacts/cursedelete-linux-x64
